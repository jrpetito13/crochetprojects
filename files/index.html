<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Janine's Crochet Creations</title>
<link rel="manifest" href="manifest.json" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Crochet" />
<meta name="theme-color" content="#fafafa" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&family=Caveat:wght@400;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --linen: #f0f0f0;
    --warm-white: #fafafa;
    --parchment: #e3e3e3;
    --bark: #888888;
    --bark-dark: #4a4a4a;
    --ink: #1a1a1a;
    --muted: #777777;
    --border: rgba(0,0,0,0.13);
    --shadow: rgba(0,0,0,0.10);
    --accent-emerald: #2d7a5c;
    --accent-sapphire: #2a5fa5;
    --accent-amethyst: #7b4fa6;
    --accent-ruby: #b03a52;
    --accent-teal: #22808a;
    --radius: 14px;
    --radius-sm: 8px;
  }

  body { background: var(--linen); color: var(--ink); font-family: 'Lato', sans-serif; font-weight: 300; min-height: 100vh; }

  header {
    background: var(--warm-white); border-bottom: 1px solid var(--border);
    padding: 2rem 2.5rem 1.5rem; display: flex; align-items: flex-end;
    justify-content: space-between; flex-wrap: wrap; gap: 1rem; position: sticky; top: 0; z-index: 100;
  }
  .logo { display: flex; flex-direction: column; gap: 0; }
  .logo-main { font-family: 'Playfair Display', serif; font-style: italic; font-size: 2rem; color: var(--bark-dark); letter-spacing: -0.02em; line-height: 1; }
  .logo-sub { font-family: 'Caveat', cursive; font-size: 1rem; color: var(--muted); letter-spacing: 0.04em; margin-top: 2px; }
  .header-actions { display: flex; align-items: center; gap: 1rem; }
  .stat-pill { font-family: 'Caveat', cursive; font-size: 0.95rem; color: var(--muted); background: var(--parchment); padding: 4px 14px; border-radius: 20px; }
  .btn-add {
    background: var(--bark-dark); color: var(--warm-white); border: none; border-radius: 30px;
    padding: 10px 22px; font-family: 'Lato', sans-serif; font-size: 0.88rem; font-weight: 700;
    letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; transition: background 0.2s, transform 0.1s;
    display: flex; align-items: center; gap: 8px;
  }
  .btn-add:hover { background: var(--bark); }
  .btn-add:active { transform: scale(0.97); }
  .btn-add svg { width: 16px; height: 16px; }

  .filter-bar {
    display: flex; align-items: center; gap: 0.75rem; padding: 1rem 2.5rem;
    background: var(--warm-white); border-bottom: 1px solid var(--border); flex-wrap: wrap;
  }
  .filter-label { font-family: 'Caveat', cursive; font-size: 1rem; color: var(--muted); margin-right: 4px; }
  .filter-chip {
    background: transparent; border: 1px solid var(--border); border-radius: 20px; padding: 5px 14px;
    font-family: 'Lato', sans-serif; font-size: 0.82rem; color: var(--muted); cursor: pointer; transition: all 0.18s;
  }
  .filter-chip.active, .filter-chip:hover { background: var(--bark-dark); color: var(--warm-white); border-color: var(--bark-dark); }
  .search-input {
    margin-left: auto; border: 1px solid var(--border); border-radius: 20px; padding: 6px 16px;
    font-family: 'Lato', sans-serif; font-size: 0.85rem; background: var(--linen); color: var(--ink);
    outline: none; width: 200px; transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--bark); }
  .search-input::placeholder { color: var(--muted); }

  main { padding: 2.5rem; }
  .gallery-section-label { font-family: 'Caveat', cursive; font-size: 1.1rem; color: var(--muted); margin-bottom: 1.5rem; padding-left: 2px; letter-spacing: 0.02em; }
  .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.75rem; }

  .card {
    background: var(--warm-white); border-radius: var(--radius); border: 1px solid var(--border);
    overflow: hidden; cursor: pointer; display: flex; flex-direction: column;
    transition: transform 0.22s cubic-bezier(.34,1.56,.64,1), box-shadow 0.22s;
  }
  .card:hover { transform: translateY(-6px) rotate(-0.3deg); box-shadow: 0 16px 40px var(--shadow); }
  .card-image-wrap { position: relative; aspect-ratio: 4/3; overflow: hidden; background: var(--parchment); }
  .card-image-wrap img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; }
  .card:hover .card-image-wrap img { transform: scale(1.04); }
  .card-placeholder {
    width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
    background: linear-gradient(135deg, var(--parchment) 0%, #d4d4d4 100%);
  }
  .placeholder-yarn { font-size: 3rem; opacity: 0.45; }
  .placeholder-text { font-family: 'Caveat', cursive; font-size: 0.9rem; color: var(--muted); opacity: 0.7; }
  .card-photo-count {
    position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.52); color: #fff;
    border-radius: 20px; padding: 3px 10px; font-size: 0.75rem; font-family: 'Lato', sans-serif;
    font-weight: 700; letter-spacing: 0.04em;
  }
  .card-status-badge { position: absolute; top: 12px; right: 12px; padding: 4px 12px; border-radius: 20px; font-family: 'Caveat', cursive; font-size: 0.85rem; font-weight: 600; }
  .badge-finished { background: #d4f0e5; color: #1a5c3e; }
  .badge-wip { background: #fde9b8; color: #7a4a00; }
  .badge-frogged { background: #f0d4d8; color: #6b1f2d; }
  .badge-gifted { background: #ddd4f0; color: #3d1f6b; }
  .card-body { padding: 1.1rem 1.25rem 1.25rem; flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .card-title { font-family: 'Playfair Display', serif; font-size: 1.15rem; color: var(--ink); line-height: 1.3; }
  .card-for { font-family: 'Caveat', cursive; font-size: 0.95rem; color: var(--accent-sapphire); }
  .card-meta { font-size: 0.8rem; color: var(--muted); margin-top: 4px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .card-meta span { display: flex; align-items: center; gap: 3px; }
  .card-yarn-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--bark); flex-shrink: 0; }

  .empty-state { grid-column: 1 / -1; text-align: center; padding: 5rem 2rem; color: var(--muted); }
  .empty-state-icon { font-size: 3.5rem; margin-bottom: 1rem; opacity: 0.5; }
  .empty-state h3 { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.5rem; color: var(--bark); margin-bottom: 0.5rem; }
  .empty-state p { font-size: 0.95rem; }

  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000;
    align-items: center; justify-content: center; padding: 1.5rem; backdrop-filter: blur(3px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--warm-white); border-radius: var(--radius); width: 100%; max-width: 660px;
    max-height: 90vh; overflow-y: auto; box-shadow: 0 30px 80px rgba(0,0,0,0.25);
    animation: modalIn 0.28s cubic-bezier(.34,1.56,.64,1); position: relative;
  }
  @keyframes modalIn { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }

  /* ── DETAIL PHOTO SECTION ── */
  .detail-photo-section { background: #111; border-radius: var(--radius) var(--radius) 0 0; overflow: hidden; }
  .detail-main-img-wrap { position: relative; aspect-ratio: 16/9; overflow: hidden; background: var(--parchment); }
  .detail-main-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .detail-image-placeholder {
    width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
    font-size: 4rem; opacity: 0.35; background: linear-gradient(135deg, var(--parchment) 0%, #d4d4d4 100%);
  }

  .photo-strip { display: flex; gap: 6px; padding: 8px 10px; overflow-x: auto; background: #1a1a1a; scrollbar-width: thin; scrollbar-color: #555 transparent; }
  .photo-strip-thumb {
    flex-shrink: 0; width: 64px; height: 64px; border-radius: 6px; overflow: hidden;
    border: 2.5px solid transparent; cursor: pointer; transition: border-color 0.15s; position: relative;
  }
  .photo-strip-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .photo-strip-thumb.is-main { border-color: #fff; }
  .photo-strip-thumb:not(.is-main):hover { border-color: rgba(255,255,255,0.4); }
  .thumb-delete {
    position: absolute; top: 2px; right: 2px; width: 18px; height: 18px; border-radius: 50%;
    background: rgba(0,0,0,0.7); color: #fff; font-size: 10px; border: none; cursor: pointer;
    display: none; align-items: center; justify-content: center; line-height: 1;
  }
  .photo-strip-thumb:hover .thumb-delete { display: flex; }
  .thumb-add-btn {
    flex-shrink: 0; width: 64px; height: 64px; border-radius: 6px; border: 2px dashed rgba(255,255,255,0.28);
    background: transparent; color: rgba(255,255,255,0.5); font-size: 1.5rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: border-color 0.15s, color 0.15s;
  }
  .thumb-add-btn:hover { border-color: rgba(255,255,255,0.7); color: rgba(255,255,255,0.9); }
  .strip-hint { font-family: 'Caveat', cursive; font-size: 0.8rem; color: rgba(255,255,255,0.38); padding: 0 10px 7px; background: #1a1a1a; text-align: right; }

  /* ── DETAIL BODY ── */
  .detail-body { padding: 1.75rem 2rem; }
  .detail-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .detail-title { font-family: 'Playfair Display', serif; font-size: 1.65rem; color: var(--ink); line-height: 1.2; }
  .detail-for { font-family: 'Caveat', cursive; font-size: 1.1rem; color: var(--accent-sapphire); margin-top: 2px; }
  .detail-badge { display: flex; flex-shrink: 0; align-self: flex-start; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem 2rem; margin-bottom: 1.25rem; }
  .detail-field label { display: block; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; }
  .detail-field p { font-size: 0.95rem; color: var(--ink); line-height: 1.5; }
  .detail-field a { color: var(--accent-sapphire); text-decoration: none; font-size: 0.95rem; }
  .detail-field a:hover { text-decoration: underline; }
  .detail-notes { background: var(--linen); border-left: 3px solid var(--bark); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; padding: 1rem 1.25rem; margin-bottom: 1.5rem; }
  .detail-notes label { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 5px; }
  .detail-notes p { font-family: 'Caveat', cursive; font-size: 1rem; color: var(--ink); line-height: 1.55; white-space: pre-wrap; }
  .detail-actions { display: flex; justify-content: space-between; align-items: center; padding-top: 1rem; border-top: 1px solid var(--border); }

  .btn-edit { background: var(--bark-dark); color: var(--warm-white); border: none; border-radius: 30px; padding: 10px 22px; font-family: 'Lato', sans-serif; font-size: 0.85rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; }
  .btn-edit:hover { background: var(--bark); }
  .btn-delete { background: transparent; border: 1px solid #d4a0a8; border-radius: 30px; padding: 9px 18px; font-family: 'Lato', sans-serif; font-size: 0.82rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--accent-ruby); cursor: pointer; transition: all 0.18s; }
  .btn-delete:hover { background: #fdf0f2; border-color: var(--accent-ruby); }
  .btn-close {
    position: absolute; top: 14px; right: 14px; background: rgba(250,250,250,0.92); border: 1px solid var(--border);
    border-radius: 50%; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 1.1rem; color: var(--bark-dark); z-index: 10; transition: background 0.15s;
  }
  .btn-close:hover { background: var(--warm-white); }

  /* ── FORM ── */
  .form-modal { position: relative; }
  .form-header { padding: 1.75rem 2rem 0; display: flex; align-items: center; justify-content: space-between; }
  .form-title { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.45rem; color: var(--bark-dark); }
  .form-body { padding: 1.5rem 2rem 2rem; display: flex; flex-direction: column; gap: 1.1rem; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group label { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
  .form-group input, .form-group select, .form-group textarea {
    border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 9px 13px;
    font-family: 'Lato', sans-serif; font-size: 0.93rem; color: var(--ink); background: var(--linen);
    outline: none; transition: border-color 0.18s; width: 100%;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--bark); background: var(--warm-white); }
  .form-group textarea { resize: vertical; min-height: 90px; font-family: 'Caveat', cursive; font-size: 1rem; }
  .form-group select { cursor: pointer; }

  /* photo grid */
  .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(96px, 1fr)); gap: 8px; }
  .photo-grid-thumb { position: relative; aspect-ratio: 1; border-radius: var(--radius-sm); overflow: hidden; border: 2.5px solid transparent; }
  .photo-grid-thumb.is-main { border-color: var(--bark-dark); }
  .photo-grid-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .thumb-label { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.6); font-family: 'Lato', sans-serif; font-size: 0.62rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: #fff; padding: 3px 6px; text-align: center; }
  .thumb-set-main { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.6); color: #fff; font-size: 0.62rem; font-family: 'Lato', sans-serif; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; border: none; cursor: pointer; padding: 4px 6px; text-align: center; }
  .thumb-set-main:hover { background: rgba(0,0,0,0.82); }
  .thumb-remove { position: absolute; top: 4px; right: 4px; width: 20px; height: 20px; border-radius: 50%; background: rgba(0,0,0,0.65); color: #fff; font-size: 11px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .photo-add-tile { aspect-ratio: 1; border: 2px dashed var(--border); border-radius: var(--radius-sm); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; cursor: pointer; color: var(--muted); font-family: 'Caveat', cursive; font-size: 0.85rem; background: var(--linen); transition: border-color 0.18s, background 0.18s; }
  .photo-add-tile:hover { border-color: var(--bark); background: var(--parchment); }
  .photo-add-tile-icon { font-size: 1.6rem; opacity: 0.5; }

  .form-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 0.5rem; }
  .btn-save { background: var(--bark-dark); color: var(--warm-white); border: none; border-radius: 30px; padding: 11px 28px; font-family: 'Lato', sans-serif; font-size: 0.88rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; }
  .btn-save:hover { background: var(--bark); }
  .btn-cancel { background: transparent; border: none; font-family: 'Lato', sans-serif; font-size: 0.85rem; color: var(--muted); cursor: pointer; text-decoration: underline; text-underline-offset: 3px; }
  .btn-cancel:hover { color: var(--ink); }

  @media (max-width: 600px) {
    header { padding: 1.25rem 1.25rem 1rem; }
    main { padding: 1.5rem 1.25rem; }
    .filter-bar { padding: 0.75rem 1.25rem; }
    .form-row { grid-template-columns: 1fr; }
    .detail-grid { grid-template-columns: 1fr; }
    .form-body { padding: 1.25rem 1.25rem 1.5rem; }
    .detail-body { padding: 1.25rem 1.25rem; }
    .search-input { width: 100%; }
    .logo-main { font-size: 1.6rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-main">Janine's Crochet Creations</span>
    <span class="logo-sub">a crochet project diary</span>
  </div>
  <div class="header-actions">
    <span class="stat-pill" id="stat-pill">0 projects</span>
    <button class="btn-add" onclick="openAddForm()">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="10" y1="4" x2="10" y2="16"/><line x1="4" y1="10" x2="16" y2="10"/>
      </svg>
      Add project
    </button>
  </div>
</header>

<div class="filter-bar">
  <span class="filter-label">show:</span>
  <button class="filter-chip active" onclick="setFilter('all', this)">All</button>
  <button class="filter-chip" onclick="setFilter('finished', this)">Finished</button>
  <button class="filter-chip" onclick="setFilter('wip', this)">In progress</button>
  <button class="filter-chip" onclick="setFilter('gifted', this)">Gifted</button>
  <button class="filter-chip" onclick="setFilter('frogged', this)">Frogged</button>
  <input class="search-input" type="search" placeholder="Search projects..." oninput="setSearch(this.value)" />
</div>

<main>
  <div class="gallery-section-label" id="section-label">all projects</div>
  <div class="gallery" id="gallery"></div>
</main>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detail-overlay" onclick="closeDetailOnOverlay(event)">
  <div class="modal" id="detail-modal">
    <button class="btn-close" onclick="closeDetail()">✕</button>
    <div id="detail-content"></div>
  </div>
</div>

<!-- FORM MODAL -->
<div class="modal-overlay" id="form-overlay" onclick="closeFormOnOverlay(event)">
  <div class="modal form-modal">
    <div class="form-header">
      <span class="form-title" id="form-title">new project</span>
      <button class="btn-close" style="position:static;" onclick="closeForm()">✕</button>
    </div>
    <div class="form-body">
      <div class="form-group">
        <label>Project name *</label>
        <input type="text" id="f-name" placeholder="e.g. Grandma's Cable Blanket" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Status</label>
          <select id="f-status">
            <option value="wip">In progress</option>
            <option value="finished">Finished</option>
            <option value="gifted">Gifted</option>
            <option value="frogged">Frogged</option>
          </select>
        </div>
        <div class="form-group">
          <label>Date completed / started</label>
          <input type="date" id="f-date" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Made for</label>
          <input type="text" id="f-for" placeholder="e.g. myself, Mom, donation..." />
        </div>
        <div class="form-group">
          <label>Yarn type / brand</label>
          <input type="text" id="f-yarn" placeholder="e.g. Lion Brand Pound of Love" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Yarn amount</label>
          <input type="text" id="f-amount" placeholder="e.g. 3 skeins, 400g" />
        </div>
        <div class="form-group">
          <label>Pattern link</label>
          <input type="url" id="f-pattern" placeholder="https://ravelry.com/..." />
        </div>
      </div>
      <div class="form-group">
        <label>Photos <span style="font-weight:300;text-transform:none;letter-spacing:0;font-size:0.78rem;color:var(--muted);">— first photo is the gallery cover; click "set main" to change it</span></label>
        <div class="photo-grid" id="form-photo-grid"></div>
        <input type="file" id="f-photo-input" accept="image/*" multiple style="display:none;" onchange="handlePhotoUpload(event)" />
      </div>
      <div class="form-group">
        <label>Notes</label>
        <textarea id="f-notes" placeholder="Hook size, modifications, how it turned out, what you'd do differently..."></textarea>
      </div>
      <div class="form-footer">
        <button class="btn-cancel" onclick="closeForm()">cancel</button>
        <button class="btn-save" onclick="saveProject()">Save project</button>
      </div>
    </div>
  </div>
</div>

<!-- hidden file input reused for detail-view photo adding -->
<input type="file" id="detail-photo-input" accept="image/*" multiple style="display:none;" />

<script>
const STORAGE_KEY = 'hookAndHeart_v2';
let projects = [];
let currentFilter = 'all';
let currentSearch = '';
let editingId = null;
let pendingPhotos = [];
let detailOpenId = null;

function loadProjects() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) projects = JSON.parse(raw);
    // migrate v1 single-photo entries
    projects = projects.map(p => {
      if (!p.photos) { p.photos = p.photo ? [p.photo] : []; delete p.photo; }
      return p;
    });
  } catch(e) { projects = []; }
}

function saveProjects() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(projects)); } catch(e) {}
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function formatDate(d) {
  if (!d) return '';
  const [y, m, day] = d.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[parseInt(m)-1]} ${parseInt(day)}, ${y}`;
}

function statusBadge(status) {
  const map = { finished:['badge-finished','finished ✓'], wip:['badge-wip','in progress'], gifted:['badge-gifted','gifted ♡'], frogged:['badge-frogged','frogged'] };
  const [cls, label] = map[status] || map.wip;
  return `<span class="card-status-badge ${cls}">${label}</span>`;
}

function mainPhoto(p) { return p.photos && p.photos.length ? p.photos[0] : null; }

// ── GALLERY ──
function renderGallery() {
  const gallery = document.getElementById('gallery');
  const label = document.getElementById('section-label');
  const pill = document.getElementById('stat-pill');

  let visible = projects.filter(p => {
    if (currentFilter !== 'all' && p.status !== currentFilter) return false;
    if (currentSearch) {
      const q = currentSearch.toLowerCase();
      return (p.name||'').toLowerCase().includes(q) || (p.for||'').toLowerCase().includes(q)
          || (p.yarn||'').toLowerCase().includes(q) || (p.notes||'').toLowerCase().includes(q);
    }
    return true;
  });

  visible = [...visible].sort((a,b) => {
    if (a.date && b.date) return a.date.localeCompare(b.date);
    if (a.date) return -1; if (b.date) return 1;
    return a._created - b._created;
  });

  pill.textContent = `${projects.length} project${projects.length !== 1 ? 's' : ''}`;
  const filterLabels = { all:'all projects', finished:'finished projects', wip:'works in progress', gifted:'gifted projects', frogged:'frogged projects' };
  label.textContent = currentSearch ? `results for "${currentSearch}"` : filterLabels[currentFilter];

  if (visible.length === 0) {
    gallery.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🧶</div><h3>${projects.length===0?'your hook is waiting':'nothing matches'}</h3><p>${projects.length===0?'Add your first project to get started!':'Try a different search or filter.'}</p></div>`;
    return;
  }

  gallery.innerHTML = visible.map(p => {
    const cover = mainPhoto(p);
    const imgHtml = cover
      ? `<img src="${cover}" alt="${p.name}" loading="lazy" />`
      : `<div class="card-placeholder"><div class="placeholder-yarn">🧶</div><div class="placeholder-text">no photo yet</div></div>`;
    const countBadge = p.photos && p.photos.length > 1 ? `<span class="card-photo-count">◻ ${p.photos.length}</span>` : '';
    return `<article class="card" onclick="openDetail('${p.id}')">
      <div class="card-image-wrap">${imgHtml}${statusBadge(p.status)}${countBadge}</div>
      <div class="card-body">
        <div class="card-title">${p.name||'Untitled project'}</div>
        ${p.for?`<div class="card-for">for ${p.for}</div>`:''}
        <div class="card-meta">
          ${p.date?`<span>📅 ${formatDate(p.date)}</span>`:''}
          ${p.yarn?`<span><span class="card-yarn-dot"></span>${p.yarn}${p.amount?' · '+p.amount:''}</span>`:''}
        </div>
      </div>
    </article>`;
  }).join('');
}

// ── DETAIL ──
function openDetail(id) {
  const p = projects.find(x => x.id === id);
  if (!p) return;
  detailOpenId = id;
  renderDetail(p);
  document.getElementById('detail-overlay').classList.add('open');
}

function renderDetail(p) {
  const photos = p.photos || [];

  const mainImgHtml = photos.length
    ? `<img src="${photos[0]}" alt="${p.name}" />`
    : `<div class="detail-image-placeholder">🧶</div>`;

  const thumbs = photos.map((src, i) =>
    `<div class="photo-strip-thumb ${i===0?'is-main':''}" onclick="detailSetMain('${p.id}',${i})" title="${i===0?'Current cover':'Click to set as gallery cover'}">
      <img src="${src}" alt="photo ${i+1}" />
      <button class="thumb-delete" onclick="event.stopPropagation();detailDeletePhoto('${p.id}',${i})" title="Remove">✕</button>
    </div>`
  ).join('');

  document.getElementById('detail-content').innerHTML = `
    <div class="detail-photo-section">
      <div class="detail-main-img-wrap">${mainImgHtml}</div>
      <div class="photo-strip">
        ${thumbs}
        <button class="thumb-add-btn" onclick="triggerDetailAdd('${p.id}')" title="Add photos">+</button>
      </div>
      ${photos.length > 1 ? '<div class="strip-hint">tap thumbnail to set as gallery cover · hover to remove</div>' : ''}
    </div>
    <div class="detail-body">
      <div class="detail-header">
        <div>
          <div class="detail-title">${p.name||'Untitled project'}</div>
          ${p.for?`<div class="detail-for">for ${p.for}</div>`:''}
        </div>
        <div class="detail-badge">${statusBadge(p.status)}</div>
      </div>
      <div class="detail-grid">
        ${p.date?`<div class="detail-field"><label>Date</label><p>${formatDate(p.date)}</p></div>`:''}
        ${p.yarn?`<div class="detail-field"><label>Yarn</label><p>${p.yarn}</p></div>`:''}
        ${p.amount?`<div class="detail-field"><label>Amount</label><p>${p.amount}</p></div>`:''}
        ${p.pattern?`<div class="detail-field"><label>Pattern</label><p><a href="${p.pattern}" target="_blank" rel="noopener">View pattern ↗</a></p></div>`:''}
      </div>
      ${p.notes?`<div class="detail-notes"><label>Notes</label><p>${p.notes}</p></div>`:''}
      <div class="detail-actions">
        <button class="btn-edit" onclick="openEditForm('${p.id}')">Edit project</button>
        <button class="btn-delete" id="delete-btn" onclick="deleteProject('${p.id}')">Delete</button>
      </div>
    </div>
  `;
}

function detailSetMain(id, idx) {
  if (idx === 0) return;
  const p = projects.find(x => x.id === id);
  if (!p) return;
  p.photos.unshift(p.photos.splice(idx, 1)[0]);
  saveProjects(); renderGallery(); renderDetail(p);
}

function detailDeletePhoto(id, idx) {
  const p = projects.find(x => x.id === id);
  if (!p) return;
  if (!confirm('Remove this photo?')) return;
  p.photos.splice(idx, 1);
  saveProjects(); renderGallery(); renderDetail(p);
}

function triggerDetailAdd(id) {
  detailOpenId = id;
  const inp = document.getElementById('detail-photo-input');
  inp.onchange = (e) => {
    const files = Array.from(e.target.files);
    if (!files.length) return;
    const p = projects.find(x => x.id === id);
    if (!p) return;
    let done = 0;
    files.forEach(f => {
      const r = new FileReader();
      r.onload = ev => { p.photos.push(ev.target.result); done++; if (done===files.length) { saveProjects(); renderGallery(); renderDetail(p); } };
      r.readAsDataURL(f);
    });
    e.target.value = '';
  };
  inp.click();
}

function closeDetail() { document.getElementById('detail-overlay').classList.remove('open'); detailOpenId = null; }
function closeDetailOnOverlay(e) { if (e.target===document.getElementById('detail-overlay')) closeDetail(); }

// ── FORM ──
function renderFormPhotoGrid() {
  const grid = document.getElementById('form-photo-grid');
  grid.innerHTML = pendingPhotos.map((src, i) =>
    `<div class="photo-grid-thumb ${i===0?'is-main':''}">
      <img src="${src}" alt="photo ${i+1}" />
      ${i===0
        ? '<span class="thumb-label">cover</span>'
        : `<button class="thumb-set-main" onclick="formSetMain(${i})">set cover</button>`}
      <button class="thumb-remove" onclick="formRemovePhoto(${i})">✕</button>
    </div>`
  ).join('') + `<div class="photo-add-tile" onclick="document.getElementById('f-photo-input').click()"><span class="photo-add-tile-icon">📷</span><span>add photo${pendingPhotos.length?'s':''}</span></div>`;
}

function formSetMain(idx) {
  if (idx===0) return;
  pendingPhotos.unshift(pendingPhotos.splice(idx,1)[0]);
  renderFormPhotoGrid();
}

function formRemovePhoto(idx) { pendingPhotos.splice(idx,1); renderFormPhotoGrid(); }

function handlePhotoUpload(e) {
  const files = Array.from(e.target.files);
  if (!files.length) return;
  let done = 0;
  files.forEach(f => {
    const r = new FileReader();
    r.onload = ev => { pendingPhotos.push(ev.target.result); done++; if (done===files.length) renderFormPhotoGrid(); };
    r.readAsDataURL(f);
  });
  e.target.value = '';
}

function openAddForm() {
  editingId = null; pendingPhotos = [];
  document.getElementById('form-title').textContent = 'new project';
  clearForm();
  document.getElementById('form-overlay').classList.add('open');
}

function openEditForm(id) {
  const p = projects.find(x => x.id===id);
  if (!p) return;
  editingId = id; pendingPhotos = p.photos ? [...p.photos] : [];
  document.getElementById('form-title').textContent = 'edit project';
  document.getElementById('f-name').value = p.name||'';
  document.getElementById('f-status').value = p.status||'wip';
  document.getElementById('f-date').value = p.date||'';
  document.getElementById('f-for').value = p.for||'';
  document.getElementById('f-yarn').value = p.yarn||'';
  document.getElementById('f-amount').value = p.amount||'';
  document.getElementById('f-pattern').value = p.pattern||'';
  document.getElementById('f-notes').value = p.notes||'';
  renderFormPhotoGrid();
  closeDetail();
  document.getElementById('form-overlay').classList.add('open');
}

function closeForm() { document.getElementById('form-overlay').classList.remove('open'); editingId=null; pendingPhotos=[]; }
function closeFormOnOverlay(e) { if (e.target===document.getElementById('form-overlay')) closeForm(); }

function clearForm() {
  ['f-name','f-date','f-for','f-yarn','f-amount','f-pattern','f-notes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-status').value='wip';
  renderFormPhotoGrid();
}

function saveProject() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { document.getElementById('f-name').focus(); return; }
  const data = {
    name, status: document.getElementById('f-status').value, date: document.getElementById('f-date').value,
    for: document.getElementById('f-for').value.trim(), yarn: document.getElementById('f-yarn').value.trim(),
    amount: document.getElementById('f-amount').value.trim(), pattern: document.getElementById('f-pattern').value.trim(),
    notes: document.getElementById('f-notes').value.trim(), photos: [...pendingPhotos],
  };
  if (editingId) {
    const idx = projects.findIndex(p=>p.id===editingId);
    if (idx!==-1) projects[idx] = {...projects[idx], ...data};
  } else {
    projects.push({id:uid(), _created:Date.now(), ...data});
  }
  saveProjects(); closeForm(); renderGallery();
}

function deleteProject(id) {
  const btn = document.getElementById('delete-btn');
  if (!btn) return;
  const actions = btn.parentElement;
  actions.innerHTML = '<span style="font-family:Caveat,cursive;font-size:1rem;color:var(--muted);">Remove this project for good?</span><span style="display:flex;gap:8px;"><button class="btn-delete" style="background:var(--accent-ruby);color:#fff;border-color:var(--accent-ruby);" id="confirm-yes">Yes, delete</button><button class="btn-cancel" id="confirm-no">Cancel</button></span>';
  document.getElementById('confirm-yes').onclick = () => { projects = projects.filter(p => p.id !== id); saveProjects(); closeDetail(); renderGallery(); };
  document.getElementById('confirm-no').onclick = () => { const p = projects.find(x => x.id === id); if (p) renderDetail(p); };
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active'); renderGallery();
}

function setSearch(v) { currentSearch=v; renderGallery(); }

loadProjects();
renderGallery();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
